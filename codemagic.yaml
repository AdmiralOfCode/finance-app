workflows:

  # ─────────────────────────────────────────────
  # Android — Release APK
  # ─────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.2
      java: 17
      groups:
        - supabase_credentials   # SUPABASE_URL, SUPABASE_ANON_KEY — set in Codemagic dashboard

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build release APK
        script: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - arash0031@outlook.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # iOS — Release IPA
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS Release IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.2
      xcode: latest
      cocoapods: default
      groups:
        - supabase_credentials   # SUPABASE_URL, SUPABASE_ANON_KEY — set in Codemagic dashboard
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.arashdev.financeApp

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - arash0031@outlook.com
        notify:
          success: true
          failure: true
