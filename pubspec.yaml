name: finance_app
description: "Personal finance management app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend
  supabase_flutter: ^2.9.0

  # Navigation
  go_router: ^15.1.2

  # Charts
  fl_chart: ^0.71.0

  # i18n
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.1

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4

  # UI utilities
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
